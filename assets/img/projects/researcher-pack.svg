<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Researcher Pack — a closed research loop: Read, Ideate, Experiment, Write, Reflect">
  <defs>
    <linearGradient id="rp-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f1ea"/>
      <stop offset="100%" stop-color="#e6ddcb"/>
    </linearGradient>
    <linearGradient id="rp-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0055aa"/>
      <stop offset="100%" stop-color="#6cb4ee"/>
    </linearGradient>
    <marker id="rp-arrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0055aa"/>
    </marker>
  </defs>

  <rect width="400" height="250" fill="url(#rp-bg)"/>

  <!-- circular loop with arrow markers -->
  <g fill="none" stroke="url(#rp-ring)" stroke-width="3" stroke-linecap="round">
    <!-- five arcs between nodes to suggest direction -->
    <path d="M 200 45 A 80 80 0 0 1 276 97"  marker-end="url(#rp-arrow)"/>
    <path d="M 276 97 A 80 80 0 0 1 247 186" marker-end="url(#rp-arrow)"/>
    <path d="M 247 186 A 80 80 0 0 1 153 186" marker-end="url(#rp-arrow)"/>
    <path d="M 153 186 A 80 80 0 0 1 124 97"  marker-end="url(#rp-arrow)"/>
    <path d="M 124 97 A 80 80 0 0 1 200 45"   marker-end="url(#rp-arrow)"/>
  </g>

  <!-- central terminal / prompt glyph: one command -->
  <g>
    <rect x="160" y="108" width="80" height="44" rx="6" ry="6" fill="#0b1f33"/>
    <polyline points="170,122 180,131 170,140" fill="none" stroke="#6cb4ee" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="186" y1="141" x2="208" y2="141" stroke="#6cb4ee" stroke-width="2.2" stroke-linecap="round"/>
  </g>

  <!-- five nodes around the loop -->
  <g font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#0b1f33">
    <circle cx="200" cy="45"  r="14" fill="#ffffff" stroke="#0055aa" stroke-width="2"/>
    <text x="200" y="28">Read</text>

    <circle cx="286" cy="107" r="14" fill="#ffffff" stroke="#0055aa" stroke-width="2"/>
    <text x="304" y="93" text-anchor="start">Ideate</text>

    <circle cx="252" cy="196" r="14" fill="#ffffff" stroke="#0055aa" stroke-width="2"/>
    <text x="272" y="218" text-anchor="start">Experiment</text>

    <circle cx="148" cy="196" r="14" fill="#ffffff" stroke="#0055aa" stroke-width="2"/>
    <text x="128" y="218" text-anchor="end">Write</text>

    <circle cx="114" cy="107" r="14" fill="#ffffff" stroke="#0055aa" stroke-width="2"/>
    <text x="96" y="93" text-anchor="end">Reflect</text>
  </g>

  <!-- small page icons inside each node -->
  <g fill="#0055aa">
    <rect x="195" y="40"  width="10" height="12" rx="1"/>
    <rect x="281" y="102" width="10" height="12" rx="1"/>
    <rect x="247" y="191" width="10" height="12" rx="1"/>
    <rect x="143" y="191" width="10" height="12" rx="1"/>
    <rect x="109" y="102" width="10" height="12" rx="1"/>
  </g>
</svg>
