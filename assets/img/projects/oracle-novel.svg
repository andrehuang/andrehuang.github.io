<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Oracle — a novel in planning, on civilizational encounter, freedom, and a not-yet-arrived 'tianxia'">
  <defs>
    <linearGradient id="on-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4ede0"/>
      <stop offset="100%" stop-color="#ebe2d0"/>
    </linearGradient>
    <radialGradient id="on-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#faf6ec" stop-opacity="1"/>
      <stop offset="100%" stop-color="#faf6ec" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="250" fill="url(#on-bg)"/>

  <!-- subtle paper texture dots -->
  <g fill="#a89c84" fill-opacity="0.18">
    <circle cx="40"  cy="40"  r="1.2"/>
    <circle cx="360" cy="50"  r="1.2"/>
    <circle cx="70"  cy="210" r="1.2"/>
    <circle cx="340" cy="200" r="1.2"/>
    <circle cx="200" cy="30"  r="1.2"/>
    <circle cx="200" cy="220" r="1.2"/>
  </g>

  <!-- soft halo behind the oracle disc -->
  <circle cx="200" cy="125" r="105" fill="url(#on-glow)"/>

  <!-- west / east halves of a divided world -->
  <g transform="translate(200,125)">
    <!-- west (blue) -->
    <path d="M 0 -70 A 70 70 0 0 0 0 70 Z" fill="#3e5d82" fill-opacity="0.78"/>
    <!-- east (warm brown) -->
    <path d="M 0 -70 A 70 70 0 0 1 0 70 Z" fill="#a87444" fill-opacity="0.78"/>
    <!-- contested seam -->
    <line x1="0" y1="-70" x2="0" y2="70" stroke="#7a5582" stroke-width="1.6" stroke-dasharray="3 3" stroke-opacity="0.85"/>
    <!-- thin outer ring -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#2a2418" stroke-width="1.3" stroke-opacity="0.55"/>
    <!-- inner oracle ring -->
    <circle cx="0" cy="0" r="42" fill="none" stroke="#faf6ec" stroke-width="1.1" stroke-opacity="0.75"/>
    <!-- oracle dot -->
    <circle cx="0" cy="0" r="6" fill="#faf6ec"/>
    <circle cx="0" cy="0" r="2.4" fill="#4a4a58"/>
  </g>

  <!-- four cardinal tick marks (steppe N, maritime S, west W, east E) -->
  <g stroke="#2a2418" stroke-opacity="0.5" stroke-width="1.3">
    <line x1="200" y1="40"  x2="200" y2="48"/>
    <line x1="200" y1="202" x2="200" y2="210"/>
    <line x1="118" y1="125" x2="126" y2="125"/>
    <line x1="274" y1="125" x2="282" y2="125"/>
  </g>

  <!-- tiny constellation / prophecy network -->
  <g fill="#4a4a58" fill-opacity="0.7">
    <circle cx="60"  cy="70"  r="1.8"/>
    <circle cx="90"  cy="55"  r="1.6"/>
    <circle cx="78"  cy="95"  r="1.6"/>
    <circle cx="340" cy="180" r="1.8"/>
    <circle cx="312" cy="200" r="1.6"/>
    <circle cx="325" cy="160" r="1.6"/>
  </g>
  <g stroke="#4a4a58" stroke-opacity="0.35" stroke-width="0.8" fill="none">
    <line x1="60"  y1="70"  x2="90"  y2="55"/>
    <line x1="90"  y1="55"  x2="78"  y2="95"/>
    <line x1="60"  y1="70"  x2="78"  y2="95"/>
    <line x1="340" y1="180" x2="312" y2="200"/>
    <line x1="312" y1="200" x2="325" y2="160"/>
    <line x1="340" y1="180" x2="325" y2="160"/>
  </g>
</svg>
