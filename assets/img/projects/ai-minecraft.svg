<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="AI x Minecraft — teaching teens to harness AI through project-based Minecraft work">
  <defs>
    <linearGradient id="mc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f5ee"/>
      <stop offset="100%" stop-color="#efebde"/>
    </linearGradient>
    <pattern id="mc-grass" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#4a8447"/>
      <rect width="3" height="3" x="2" y="2" fill="#2f5a2c"/>
      <rect width="3" height="3" x="9" y="6" fill="#2f5a2c" opacity="0.6"/>
      <rect width="2" height="2" x="6" y="10" fill="#1c3a1b" opacity="0.5"/>
    </pattern>
    <pattern id="mc-dirt" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#a8896b"/>
      <rect width="3" height="3" x="2" y="2" fill="#7d6849"/>
      <rect width="3" height="3" x="9" y="7" fill="#7d6849" opacity="0.7"/>
    </pattern>
  </defs>

  <rect width="400" height="250" fill="url(#mc-bg)"/>

  <!-- subtle dot grid -->
  <g fill="#2f5a2c" fill-opacity="0.08">
    <circle cx="40"  cy="40"  r="1.5"/>
    <circle cx="80"  cy="40"  r="1.5"/>
    <circle cx="120" cy="40"  r="1.5"/>
    <circle cx="40"  cy="80"  r="1.5"/>
    <circle cx="360" cy="200" r="1.5"/>
    <circle cx="320" cy="40"  r="1.5"/>
    <circle cx="360" cy="80"  r="1.5"/>
    <circle cx="40"  cy="200" r="1.5"/>
  </g>

  <!-- back grass block -->
  <g transform="translate(150,40)">
    <polygon points="0,30 40,10 80,30 80,80 40,100 0,80" fill="url(#mc-grass)" stroke="#1c3a1b" stroke-width="1.5"/>
    <polygon points="0,30 40,50 80,30" fill="url(#mc-grass)" stroke="#1c3a1b" stroke-width="1.5"/>
    <polygon points="0,30 40,50 40,100 0,80" fill="url(#mc-dirt)" stroke="#1c3a1b" stroke-width="1.5" opacity="0.85"/>
  </g>

  <!-- front grass block -->
  <g transform="translate(110,90)">
    <polygon points="0,30 40,10 80,30 80,80 40,100 0,80" fill="url(#mc-grass)" stroke="#1c3a1b" stroke-width="1.5"/>
    <polygon points="0,30 40,50 80,30" fill="url(#mc-grass)" stroke="#1c3a1b" stroke-width="1.5"/>
    <polygon points="0,30 40,50 40,100 0,80" fill="url(#mc-dirt)" stroke="#1c3a1b" stroke-width="1.5" opacity="0.85"/>
  </g>

  <!-- floating "AI" pixel cluster (copper, like the hero art) -->
  <g transform="translate(255,55)" fill="#b8642a">
    <!-- letter A -->
    <rect x="0"  y="6"  width="6" height="6"/>
    <rect x="0"  y="12" width="6" height="6"/>
    <rect x="0"  y="18" width="6" height="6"/>
    <rect x="0"  y="24" width="6" height="6"/>
    <rect x="6"  y="0"  width="6" height="6"/>
    <rect x="12" y="6"  width="6" height="6"/>
    <rect x="12" y="12" width="6" height="6"/>
    <rect x="12" y="18" width="6" height="6"/>
    <rect x="12" y="24" width="6" height="6"/>
    <rect x="6"  y="12" width="6" height="6"/>
    <!-- letter I -->
    <rect x="26" y="0"  width="6" height="6"/>
    <rect x="26" y="6"  width="6" height="6"/>
    <rect x="26" y="12" width="6" height="6"/>
    <rect x="26" y="18" width="6" height="6"/>
    <rect x="26" y="24" width="6" height="6"/>
  </g>

  <!-- gold highlight sparkle -->
  <g transform="translate(305,110)" fill="#c79420">
    <rect x="6"  y="0"  width="4" height="4"/>
    <rect x="0"  y="6"  width="4" height="4"/>
    <rect x="12" y="6"  width="4" height="4"/>
    <rect x="6"  y="12" width="4" height="4"/>
  </g>
</svg>
