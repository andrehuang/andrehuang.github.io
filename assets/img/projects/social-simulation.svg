<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Social simulation — a network of interacting agents">
  <defs>
    <linearGradient id="ss-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf2fb"/>
      <stop offset="100%" stop-color="#d6e6f7"/>
    </linearGradient>
    <radialGradient id="ss-agent" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#6cb4ee"/>
      <stop offset="100%" stop-color="#0055aa"/>
    </radialGradient>
    <radialGradient id="ss-agent-alt" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffd58a"/>
      <stop offset="100%" stop-color="#e08a1f"/>
    </radialGradient>
  </defs>

  <rect width="400" height="250" fill="url(#ss-bg)"/>

  <!-- subtle dot grid to hint at a simulated environment -->
  <g fill="#0055aa" fill-opacity="0.08">
    <circle cx="40" cy="40" r="1.5"/>
    <circle cx="80" cy="40" r="1.5"/>
    <circle cx="120" cy="40" r="1.5"/>
    <circle cx="160" cy="40" r="1.5"/>
    <circle cx="200" cy="40" r="1.5"/>
    <circle cx="240" cy="40" r="1.5"/>
    <circle cx="280" cy="40" r="1.5"/>
    <circle cx="320" cy="40" r="1.5"/>
    <circle cx="360" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/>
    <circle cx="80" cy="80" r="1.5"/>
    <circle cx="120" cy="80" r="1.5"/>
    <circle cx="160" cy="80" r="1.5"/>
    <circle cx="200" cy="80" r="1.5"/>
    <circle cx="240" cy="80" r="1.5"/>
    <circle cx="280" cy="80" r="1.5"/>
    <circle cx="320" cy="80" r="1.5"/>
    <circle cx="360" cy="80" r="1.5"/>
    <circle cx="40" cy="120" r="1.5"/>
    <circle cx="80" cy="120" r="1.5"/>
    <circle cx="120" cy="120" r="1.5"/>
    <circle cx="160" cy="120" r="1.5"/>
    <circle cx="200" cy="120" r="1.5"/>
    <circle cx="240" cy="120" r="1.5"/>
    <circle cx="280" cy="120" r="1.5"/>
    <circle cx="320" cy="120" r="1.5"/>
    <circle cx="360" cy="120" r="1.5"/>
    <circle cx="40" cy="160" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/>
    <circle cx="120" cy="160" r="1.5"/>
    <circle cx="160" cy="160" r="1.5"/>
    <circle cx="200" cy="160" r="1.5"/>
    <circle cx="240" cy="160" r="1.5"/>
    <circle cx="280" cy="160" r="1.5"/>
    <circle cx="320" cy="160" r="1.5"/>
    <circle cx="360" cy="160" r="1.5"/>
    <circle cx="40" cy="200" r="1.5"/>
    <circle cx="80" cy="200" r="1.5"/>
    <circle cx="120" cy="200" r="1.5"/>
    <circle cx="160" cy="200" r="1.5"/>
    <circle cx="200" cy="200" r="1.5"/>
    <circle cx="240" cy="200" r="1.5"/>
    <circle cx="280" cy="200" r="1.5"/>
    <circle cx="320" cy="200" r="1.5"/>
    <circle cx="360" cy="200" r="1.5"/>
  </g>

  <!-- edges between agents -->
  <g stroke="#0055aa" stroke-opacity="0.45" stroke-width="1.4" fill="none" stroke-linecap="round">
    <line x1="90"  y1="85"  x2="200" y2="60"/>
    <line x1="200" y1="60"  x2="305" y2="95"/>
    <line x1="90"  y1="85"  x2="145" y2="160"/>
    <line x1="200" y1="60"  x2="200" y2="130"/>
    <line x1="305" y1="95"  x2="260" y2="180"/>
    <line x1="145" y1="160" x2="200" y2="130"/>
    <line x1="200" y1="130" x2="260" y2="180"/>
    <line x1="145" y1="160" x2="260" y2="180"/>
    <line x1="90"  y1="85"  x2="200" y2="130"/>
    <line x1="305" y1="95"  x2="200" y2="130"/>
  </g>

  <!-- agents -->
  <g>
    <circle cx="90"  cy="85"  r="14" fill="url(#ss-agent)"/>
    <circle cx="200" cy="60"  r="14" fill="url(#ss-agent-alt)"/>
    <circle cx="305" cy="95"  r="14" fill="url(#ss-agent)"/>
    <circle cx="145" cy="160" r="14" fill="url(#ss-agent)"/>
    <circle cx="200" cy="130" r="16" fill="url(#ss-agent-alt)"/>
    <circle cx="260" cy="180" r="14" fill="url(#ss-agent)"/>
  </g>

  <!-- highlight the central "active" agent -->
  <circle cx="200" cy="130" r="24" fill="none" stroke="#e08a1f" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="3 3"/>
</svg>
